<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>NEXA — Vista de organización</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--nx-bg-app);font-family:var(--nx-font-sans);color:var(--nx-fg-primary);min-height:100vh;}
  *{box-sizing:border-box;}
  @keyframes nx-pulse{0%,100%{box-shadow:0 0 24px rgba(0,194,203,.7);}50%{box-shadow:0 0 36px rgba(0,194,203,1),0 0 60px rgba(0,194,203,.3);}}
  .app{display:flex;min-height:100vh;}
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .content{padding:24px 32px 64px;display:flex;flex-direction:column;gap:20px;}
  .row-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:flex-start;}
  .row-main{display:grid;grid-template-columns:1.55fr 1fr;gap:20px;align-items:flex-start;}
  @media (max-width:1200px){.row-2,.row-main{grid-template-columns:1fr;}}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:rgba(10,15,30,0.15);border-radius:10px;}
  ::-webkit-scrollbar-thumb:hover{background:rgba(10,15,30,0.25);}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script src="data.js"></script>
<script type="text/babel" src="../../ui_kits/nexa-app/atoms.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Analytics.jsx"></script>
<script type="text/babel" src="Roster.jsx"></script>

<script type="text/babel">
const { useState } = React;

function Sidebar({ activeOrg, onSwitchOrg }) {
  const items = [
    { key: "dashboard", icon: "◈", name: "Dashboard",       desc: "Vista general" },
    { key: "masivo",    icon: "🗂️", name: "Nexíficar Masivo" },
    { key: "validador", icon: "⚡", name: "Validador IA" },
    { key: "editar",    icon: "✏️", name: "Editar PDF" },
    { key: "dividir",   icon: "✂️", name: "Dividir PDF" },
  ];
  return (
    <aside style={{
      width: 240, minWidth: 240, background: "#0A0F1E",
      borderRight: "1px solid rgba(255,255,255,0.06)",
      display: "flex", flexDirection: "column",
      height: "100vh", position: "sticky", top: 0,
    }}>
      <div style={{ padding: "24px 20px 20px", borderBottom: "1px solid rgba(255,255,255,0.04)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{
            width: 34, height: 34, borderRadius: 9,
            background: "linear-gradient(135deg,#00C2CB 0%,#0099FF 100%)",
            display: "flex", alignItems: "center", justifyContent: "center",
            color: "#0A0F1E", fontSize: 14, fontWeight: 900,
            boxShadow: "0 0 18px rgba(0,194,203,0.5)",
          }}>NX</div>
          <div>
            <div style={{ fontSize: 18, fontWeight: 900, letterSpacing: -0.5,
              background: "linear-gradient(135deg,#00C2CB,#66E0E4)",
              WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>NEXA</div>
            <div style={{ fontSize: 9, color: "rgba(255,255,255,0.35)", textTransform: "uppercase", letterSpacing: 1.2, marginTop: 1 }}>
              Grupo Bolívar
            </div>
          </div>
        </div>
      </div>

      <div style={{ flex: 1, padding: "18px 12px", overflowY: "auto" }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: "rgba(255,255,255,0.35)", textTransform: "uppercase", letterSpacing: 1.2, padding: "0 8px 10px" }}>
          Menú principal
        </div>
        {items.map(t => (
          <div key={t.key} style={{
            display: "flex", alignItems: "center", gap: 10,
            padding: "9px 10px", borderRadius: 10, marginBottom: 2, cursor: "pointer",
          }}>
            <div style={{
              width: 26, height: 26, borderRadius: 7,
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 13, background: "rgba(255,255,255,0.04)",
            }}>{t.icon}</div>
            <div style={{ flex: 1, fontSize: 12, fontWeight: 600, color: "#C8D1E0" }}>{t.name}</div>
          </div>
        ))}

        <div style={{ fontSize: 10, fontWeight: 700, color: "rgba(255,255,255,0.35)", textTransform: "uppercase", letterSpacing: 1.2, padding: "18px 8px 10px" }}>
          🏢 Organizaciones
        </div>
        {Object.values(NEXA_ORGS).map(o => {
          const isActive = activeOrg === o.key;
          return (
            <div key={o.key} onClick={() => onSwitchOrg(o.key)} style={{
              display: "flex", alignItems: "center", gap: 10,
              padding: "9px 10px", borderRadius: 10, marginBottom: 2, cursor: "pointer",
              background: isActive ? `${o.accent}18` : "transparent",
              border: isActive ? `1px solid ${o.accent}40` : "1px solid transparent",
              transition: "all .15s",
            }}>
              <div style={{
                width: 26, height: 26, borderRadius: 7,
                background: isActive ? `linear-gradient(135deg, ${o.accent}, ${o.accent}aa)` : `${o.accent}30`,
                color: isActive ? "#0A0F1E" : o.accent,
                fontSize: 10, fontWeight: 900,
                display: "flex", alignItems: "center", justifyContent: "center",
                boxShadow: isActive ? `0 0 12px ${o.accent}55` : "none",
              }}>{o.short}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: isActive ? "#fff" : "#C8D1E0", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{o.name}</div>
                <div style={{ fontSize: 10, color: "rgba(255,255,255,0.4)", marginTop: 1 }}>{o.metrics.users} activos</div>
              </div>
              {isActive && <div style={{ width: 4, height: 22, borderRadius: 4, background: o.accent, boxShadow: `0 0 10px ${o.accent}` }}/>}
            </div>
          );
        })}
      </div>

      <div style={{ padding: "12px 16px 18px", textAlign: "center", color: "rgba(255,255,255,0.2)", fontSize: 10 }}>
        NEXA © 2026 · Grupo Bolívar
      </div>
    </aside>
  );
}

function Topbar({ org }) {
  return (
    <div style={{
      height: 64, background: "#FFFFFF",
      borderBottom: "1px solid rgba(10,15,30,0.06)",
      display: "flex", alignItems: "center", justifyContent: "space-between",
      padding: "0 32px", position: "sticky", top: 0, zIndex: 10,
    }}>
      <div>
        <div style={{ fontSize: 10, fontWeight: 700, color: org.accent, textTransform: "uppercase", letterSpacing: 1.4, marginBottom: 2 }}>
          🏢 Actividad por organización
        </div>
        <div style={{ fontSize: 17, fontWeight: 800, color: "#0A0F1E", letterSpacing: -0.3 }}>
          {org.name}
        </div>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 12px", background: "#F6F8FB", borderRadius: 9, border: "1px solid rgba(10,15,30,0.06)" }}>
          <span style={{ fontSize: 11, color: "#8494A8", fontWeight: 600 }}>Periodo:</span>
          <span style={{ fontSize: 12, color: "#0A0F1E", fontWeight: 700 }}>Últimos 30 días ▾</span>
        </div>
        <Button variant="secondary" size="sm" icon="⬇">Exportar CSV</Button>
        <div style={{
          width: 34, height: 34, borderRadius: "50%",
          background: "linear-gradient(135deg,#00C2CB,#0099FF)",
          color: "#0A0F1E", fontWeight: 800, fontSize: 13,
          display: "flex", alignItems: "center", justifyContent: "center",
        }}>AM</div>
      </div>
    </div>
  );
}

function App(){
  const [activeOrg, setActiveOrg] = useState("cb");
  const org = NEXA_ORGS[activeOrg];

  return (
    <div className="app">
      <Sidebar activeOrg={activeOrg} onSwitchOrg={setActiveOrg}/>
      <div className="main">
        <Topbar org={org}/>
        <div className="content">
          <OrgHeader org={org} onSwitch={setActiveOrg}/>
          <OrgKpiRow org={org}/>
          <div className="row-2">
            <ToolUsageChart org={org}/>
            <HourHeatmap org={org}/>
          </div>
          <div className="row-main">
            <AnalystsTable org={org}/>
            <ActivityFeed org={org}/>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
